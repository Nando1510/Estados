 <form class="modal-form" id="formulario_Modal">
                    <input type="hidden" id="cliente-id" value="" />

                    <div class="form-group">
                        <label for="nome">Nome</label>
                        <input class="modal-field" id="nome" type="text" placeholder="Digite o nome completo" required />
                    </div>

                    <div class="form-group">
                        <label for="cpf_cnpj">CPF/CNPJ</label>
                        <input class="modal-field" id="cpf_cnpj" type="text" placeholder="Digite o CPF ou CNPJ" />
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input class="modal-field" id="telefone" type="text" placeholder="Telefone fixo" />
                    </div>

                    <div class="form-group">
                        <label for="celular">Celular</label>
                        <input class="modal-field" id="celular" type="text" placeholder="Celular" required />
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input class="modal-field" id="email" type="email" placeholder="E-mail de contato" />
                    </div>

                    <div class="form-group">
                        <label for="rua">Rua</label>
                        <input class="modal-field" id="rua" type="text" placeholder="Nome da rua" />
                    </div>

                    <div class="form-group">
                        <label for="numero">Número</label>
                        <input class="modal-field" id="numero" type="text" placeholder="Número" />
                    </div>

                    <div class="form-group">
                        <label for="bairro">Bairro</label>
                        <input class="modal-field" id="bairro" type="text" placeholder="Bairro" />
                    </div>

                    <div class="form-group">
                        <label for="cidade">Cidade</label>
                        <input class="modal-field" id="cidade" type="text" placeholder="Cidade" required />
                    </div>

   

                    <!-- SOMENTE ESSA É A PARTE DO CÓDIGO QUE INTERESSA --> 
                    <div class="form-group">
                        <label for="estado">Estado</label>
                        <select class="modal-field" id="estado">
                            <option value="">Selecione o Estado...</option>
                        </select>
                    </div>
                     <!-- SOMENTE ESSA É A PARTE DO CÓDIGO QUE INTERESSA --> 



   

                    <div class="form-group">
                        <label for="cep">CEP</label>
                        <input class="modal-field" id="cep" type="text" placeholder="00000-000" />
                    </div>
</form>
